<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Flashcards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --accent:#ff7b00;
  --bg-light:#f4f4f7;
  --bg-dark:#0A0E17;
  --text-dark:#121212;
  --text-light:#ffffff;
  --card-light:#ffffff;
  --card-dark:#0f0f12;
}

/* Default = Light */ 
body{
  margin:0;
  font-family:"Inter",sans-serif;
  background:var(--bg-light);
  color:var(--text-dark);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  transition:.35s;
}

/* Theme Toggle Button */
.theme-toggle{
  position:fixed;
  top:18px;
  left:22px;
  border:2px solid var(--accent);
  color:var(--accent);
  padding:10px 20px;
  border-radius:14px;
  background:transparent;
  cursor:pointer;
  transition:.3s;
}

/* Flashcard */
.card{
  width:85vw;
  max-width:950px;
  height:350px;
  background:var(--card-light);
  border-radius:28px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  perspective:1400px;
  position:relative;
  overflow:hidden;
  box-shadow:0px 25px 60px rgba(0,0,0,0.2);
}

.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.22,.61,.36,1);
}

.card.flipped .inner{
  transform:rotateY(180deg);
}

.side{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:35px;
  text-align:center;
  font-size: clamp(18px,2.3vw,28px);
  line-height:1.4;
  transition:.25s;
}

.front{ transform:rotateY(0deg); }
.back{ transform:rotateY(180deg); color:var(--accent); font-weight:bold; }

/* FIX: hide inactive face */
.card:not(.flipped) .back{ opacity:0; pointer-events:none; }
.card.flipped .front{ opacity:0; pointer-events:none; }

/* Controls */
.controls{
  margin-top:32px;
  display:flex;
  gap:24px;
  justify-content:center;
}

.ctrl-btn{
  background:transparent;
  border:none;
  font-size:28px;
  cursor:pointer;
  color:var(--accent);
  padding:10px 30px;
  border-radius:12px;
  transition:.25s;
}

.ctrl-btn:hover{
  background:rgba(255,123,0,0.15);
  transform:scale(1.18);
}

.ctrl-btn:disabled{
  opacity:.25;
  cursor:not-allowed;
}

.counter{
  opacity:.65;
  font-size:14px;
  width:80px;
  text-align:center;
}

/* ======================
   DARK THEME FIX
   ====================== */
body.dark{
  background:var(--bg-dark);
  color:var(--text-light);
}

body.dark .card{
  background:var(--card-dark);
  color:var(--text-light);
  box-shadow:0px 25px 60px rgba(255,255,255,0.05);
}

body.dark .back{
  color:var(--accent);
}

body.dark .ctrl-btn{
  color:var(--accent);
}

body.dark .ctrl-btn:hover{
  background:rgba(255,123,0,0.25);
}
</style>
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<div>
  <div class="card" id="card" onclick="flipCard()">
    <div class="inner">
      <div class="side front" id="front"></div>
      <div class="side back" id="back"></div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="prevCard()" id="prevBtn">⬅</button>
    <span class="counter" id="progress"></span>
    <button class="ctrl-btn" onclick="nextCard()" id="nextBtn">➡</button>
  </div>
</div>

<script>
/* ------- Flashcards Content Here (Networking Essentials) -------- */
const flashcards = [
  {q:"What is Networking?", a:"The process of connecting devices together to create a network so they can communicate."},
  {q:"What is a Network?", a:"Two or more devices connected together to share data and resources."},
  {q:"What are hosts or nodes in a network?", a:"Devices connected to a network that can send or receive data."},
  {q:"What is a PAN?", a:"Personal Area Network – a small network around an individual, such as Bluetooth devices."},
  {q:"What is a LAN?", a:"Local Area Network – a network covering a small area such as a home or office."},
  {q:"What is a WAN?", a:"Wide Area Network – a network that spans large geographic areas, such as the internet."},
  {q:"What are the three basic components required for two hosts to communicate?", a:"An application, a protocol, and a network interface with transmission media."},
  {q:"What is an IP address?", a:"A unique identifier assigned to a device on a network to ensure data reaches the correct destination."},
  {q:"What is the difference between IPv4 and IPv6?", a:"IPv4 uses 32-bit addresses (~4.3 billion addresses), while IPv6 uses 128-bit addresses, supporting a vastly larger number of devices."},
  {q:"What is the difference between Public and Private IP addresses?", a:"Public IPs are globally unique and visible on the internet; Private IPs are used within local networks and are not directly accessible from the internet."},
  {q:"What is a Static IP address?", a:"An IP address that does not change and is often used for hosting services."},
  {q:"What is a MAC address?", a:"A unique 12-digit hexadecimal identifier assigned to a device's network interface card for local network communication."},
  {q:"What is ARP?", a:"Address Resolution Protocol – it maps IP addresses to MAC addresses within a local network."},
  {q:"What is ARP spoofing?", a:"An attack where fake ARP messages associate the attacker’s MAC address with a trusted IP address."},
  {q:"What is the OSI model?", a:"A 7-layer conceptual framework used to understand and standardize network communication."},
  {q:"Which OSI layer is responsible for routing and IP addressing?", a:"Layer 3 – Network layer."},
  {q:"Which OSI layer uses MAC addresses?", a:"Layer 2 – Data Link layer."},
  {q:"Which OSI layer is responsible for TCP and UDP?", a:"Layer 4 – Transport layer."},
  {q:"What is the difference between TCP and UDP?", a:"TCP is connection-oriented and reliable; UDP is connectionless and faster but less reliable."},
  {q:"What is HTTPS?", a:"HTTP secured with SSL/TLS encryption to protect data in transit."},
  {q:"What port does HTTP use and what port does HTTPS use?", a:"HTTP uses port 80; HTTPS uses port 443."},
  {q:"What is SMB used for?", a:"File and printer sharing over a network, mainly in Windows environments."},
  {q:"What is SNMP used for?", a:"Monitoring and managing network devices such as routers and switches."},
  {q:"What is ICMP used for?", a:"Network diagnostics and testing reachability, such as with the ping command."},
  {q:"What is the purpose of Network Segmentation?", a:"To divide networks into smaller parts to improve management and limit attacker movement."},
  {q:"What is the difference between OSI and TCP/IP models?", a:"OSI is a 7-layer conceptual model; TCP/IP is a simpler, practical model used in real-world networking."}
];

let index=0, flipped=false;

function updateCard(){
  front.innerHTML=flashcards[index].q;
  back.innerHTML=flashcards[index].a;
  progress.textContent=`${index+1}/${flashcards.length}`;
  prevBtn.disabled=index===0;
  nextBtn.disabled=index===flashcards.length-1;
  card.classList.remove("flipped");
  flipped=false;
}

function flipCard(){ flipped=!flipped; card.classList.toggle("flipped",flipped); }

function nextCard(){ if(index<flashcards.length-1) index++; updateCard(); }

function prevCard(){ if(index>0) index--; updateCard(); }

function toggleTheme(){ document.body.classList.toggle("dark"); }

updateCard();
</script>
</body>
</html>
